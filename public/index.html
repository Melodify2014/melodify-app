<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodify — Ultimate Stream Network</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <div class="brand-section">
            <span class="logo-icon">⚡</span>
            <h1 class="app-title">Melodify</h1>
        </div>
        
        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="Search tracks or producers...">
            <button id="search-btn">Search</button>
        </div>

        <div class="user-panel" id="user-panel">
            <button id="auth-trigger-btn" class="nav-btn">Sign In</button>
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar-navigation">
            <nav class="nav-menu">
                <a href="#" class="menu-item active" data-target="home">🎵 Discover Feed</a>
                <a href="#" class="menu-item" data-target="favorites">❤️ Liked Core</a>
                <a href="#" class="menu-item" data-target="history">🕒 History Log</a>
            </nav>
        </aside>

        <main class="content-container">
            <div class="view-pane dynamic-active" id="view-home">
                <h2 class="feed-title">Discover Tracks</h2>
                <div id="tracks-container" class="grid-layout"></div>
            </div>
        </main>
    </div>

    <div class="modal-overlay hidden" id="auth-modal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modal-headline">Sign In to Melodify</h3>
                <button class="close-modal" id="close-modal-btn">×</button>
            </div>
            <form id="auth-form" class="modal-form">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="auth-username" required autocomplete="username">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="auth-password" required autocomplete="current-password">
                </div>
                <button type="submit" class="auth-submit-btn" id="auth-submit-action">Continue</button>
            </form>
            <div class="modal-footer">
                <p id="auth-toggle-prompt">Don't have an account? <a href="#" id="auth-toggle-link">Register</a></p>
            </div>
        </div>
    </div>

    <footer class="persistent-player-dock hidden" id="player-dock">
        <div class="dock-content">
            <div class="active-track-info">
                <img src="" alt="" id="dock-thumb" class="dock-track-img">
                <div class="dock-meta">
                    <div id="dock-title" class="dock-txt-title">Track Title</div>
                    <div id="dock-producer" class="dock-txt-producer">Producer</div>
                </div>
                <button id="dock-like-btn" class="dock-like-icon">♡</button>
            </div>
            <div class="playback-controls">
                <button id="dock-play-btn" class="control-circle">▶</button>
            </div>
            <div class="volume-box">
                <span class="vol-icon">🔊</span>
                <input type="range" id="volume-slider" min="0" max="100" value="100">
            </div>
        </div>
    </footer>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="app.js"></script>
</body>
</html>
