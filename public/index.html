<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodify - Phonk Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-white min-h-screen antialiased flex overflow-hidden">

    <aside class="w-64 bg-zinc-950 p-6 flex flex-col justify-between border-r border-zinc-900 select-none">
        <div class="space-y-8">
            <h1 class="text-2xl font-black tracking-tighter text-white">MELODIFY</h1>
            <nav class="space-y-2">
                <a href="#" id="nav-home" class="flex items-center gap-3 text-sm font-semibold text-white bg-zinc-900 px-4 py-2.5 rounded-lg transition-all">
                    <i class="fa-solid fa-house text-purple-500"></i> Home
                </a>
                <a href="#" id="nav-following" class="flex items-center gap-3 text-sm font-semibold text-zinc-400 hover:text-white px-4 py-2.5 transition-colors">
                    <i class="fa-solid fa-users"></i> Following
                </a>
                <a href="#" id="nav-recent" class="flex items-center gap-3 text-sm font-semibold text-zinc-400 hover:text-white px-4 py-2.5 transition-colors">
                    <i class="fa-solid fa-clock"></i> Recent
                </a>
                <a href="#" id="nav-liked" class="flex items-center gap-3 text-sm font-semibold text-zinc-400 hover:text-white px-4 py-2.5 transition-colors">
                    <i class="fa-solid fa-heart"></i> Liked
                </a>
            </nav>
        </div>
        <div class="space-y-4 pt-4 border-t border-zinc-900">
            <p class="text-xs text-zinc-500 font-medium">Connected: melodify owner</p>
            <button class="w-full text-left text-sm font-semibold text-red-500 hover:text-red-400 flex items-center gap-2 transition-colors">
                <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span> Disconnect
            </button>
        </div>
    </aside>

    <main class="flex-1 bg-gradient-to-b from-zinc-900 to-black p-8 pb-32 overflow-y-auto h-screen">
        <header class="flex items-center justify-between mb-8 gap-4">
            <div class="flex items-center gap-3 flex-1 max-w-xl">
                <div class="relative w-full">
                    <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-500 text-sm"></i>
                    <input 
                        type="text" 
                        id="search-input"
                        placeholder="Search track, producer, aesthetic..."
                        class="w-full bg-zinc-900 border border-zinc-800 rounded-lg pl-10 pr-4 py-2 text-sm text-white placeholder-zinc-500 focus:outline-none focus:border-purple-500 transition-colors"
                    >
                </div>
                <button id="search-btn" class="bg-white text-black px-5 py-2 rounded-lg text-sm font-bold hover:bg-zinc-200 transition-colors">
                    Search
                </button>
            </div>
            <button class="bg-purple-600 hover:bg-purple-700 text-white font-black text-xs tracking-wider uppercase px-4 py-2.5 rounded-md shadow-lg shadow-purple-900/30 transition-all transform active:scale-95">
                ⚡ DRIFT MODE
            </button>
        </header>

        <div class="flex items-center gap-2.5 mb-8">
            <button id="filter-all" class="px-4 py-1.5 text-xs font-bold rounded-full transition-colors bg-white text-black">
                All Feeds
            </button>
            <button id="filter-music" class="px-4 py-1.5 text-xs font-bold rounded-full transition-colors bg-zinc-900 text-zinc-400 hover:text-white">
                🎵 Music Only
            </button>
        </div>

        <section class="space-y-6">
            <h2 id="feed-heading" class="text-2xl font-black tracking-tight text-white capitalize">phonk feed</h2>
            <div id="tracks-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                </div>
        </section>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-zinc-950 border-t border-zinc-900 px-5 py-3.5 flex items-center justify-between z-50 select-none">
        <div class="flex items-center gap-3.5 w-1/4 min-w-[200px]">
            <img 
                id="player-thumb"
                src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=100" 
                alt="Track Thumbnail" 
                class="w-12 h-12 rounded object-cover border border-zinc-800"
            />
            <div class="overflow-hidden">
                <h4 id="player-title" class="text-white text-sm font-bold truncate">No track selected</h4>
                <p id="player-producer" class="text-zinc-500 text-xs truncate mt-0.5">Select a phonk mix from the feed</p>
            </div>
        </div>

        <div class="flex flex-col items-center gap-2 w-2/4 max-w-xl">
            <div class="flex items-center gap-6">
                <button id="player-loop-btn" class="text-zinc-500 hover:text-zinc-300 transition-colors text-sm focus:outline-none">
                    <i class="fa-solid fa-arrows-rotate"></i>
                </button>

                <button class="text-zinc-400 hover:text-white transition-colors text-sm">
                    <i class="fa-solid fa-backward-step"></i>
                </button>

                <button id="player-play-btn" class="bg-white text-black p-2.5 rounded-full hover:scale-105 active:scale-95 transition-all flex items-center justify-center w-10 h-10">
                    <i id="play-icon" class="fa-solid fa-play translate-x-[1px]"></i>
                </button>

                <button class="text-zinc-400 hover:text-white transition-colors text-sm">
                    <i class="fa-solid fa-forward-step"></i>
                </button>

                <button id="player-like-btn" class="text-zinc-500 hover:text-zinc-300 transition-colors text-sm focus:outline-none">
                    <i id="like-icon" class="fa-regular fa-heart"></i>
                </button>
            </div>

            <div class="flex items-center gap-2.5 w-full text-[11px] font-medium text-zinc-500">
                <span id="track-time-current">0:00</span>
                <div class="h-1 w-full bg-zinc-800 rounded-full cursor-pointer relative group transition-all">
                    <div class="h-full bg-purple-500 rounded-full w-0 group-hover:bg-purple-400 transition-all"></div>
                </div>
                <span id="track-time-total">0:00</span>
            </div>
        </div>

        <div class="flex items-center gap-2 w-1/4 justify-end min-w-[120px]">
            <i class="fa-solid fa-volume-high text-zinc-500 text-xs"></i>
            <input 
                type="range" 
                min="0" 
                max="100" 
                value="80"
                class="w-20 accent-purple-500 h-1 bg-zinc-800 rounded-lg appearance-none cursor-pointer"
            >
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
