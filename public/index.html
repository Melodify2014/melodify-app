<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodify — Audio Streaming</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div class="container">
        <h1 class="logo">Melodify</h1>
        
        <div class="search-box">
            <input type="text" placeholder="Search tracks or producers...">
            <button class="btn-main">Search</button>
        </div>

        <div class="nav-links">
            <span class="active">🎵 Discover Feed</span> | <span>📺 Subscribed Channels</span>
        </div>

        <h2>Now Playing (Audio Only)</h2>
        
        <div class="audio-player-widget">
            <div class="track-details">
                <div class="vinyl-disk" id="disk-element">🎵</div>
                <div>
                    <h3 id="player-title">METAMORPHOSIS (PHONK)</h3>
                    <p id="player-artist">INTERWORLD</p>
                </div>
            </div>
            <div class="player-controls">
                <button class="control-btn" id="play-btn">▶ Play</button>
                <button class="control-btn" id="pause-btn">⏸ Pause</button>
            </div>
        </div>

        <div class="hidden-video-anchor">
            <div id="player"></div>
        </div>

        <h2>Discover Tracks</h2>
        <div class="track-list" id="catalog-view">
            </div>

        <h2>Your Subscribed Channels</h2>
        <div class="artist-card">
            <h3>Producer Name</h3>
            <p class="gray-text">Verified Artist Channel</p>
            <button class="btn-main sm">Subscribe</button>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
