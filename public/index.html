<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Melodify Player</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "lucide": "https://esm.sh/lucide@0.468.0?bundle"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <div class="player-hud">
        <header>
          <p>Now Playing</p>
          <span class="brand">Melodify</span>
        </header>

        <div class="track-info">
          <h1 id="trackTitle">Ambient Pulse</h1>
          <p id="trackArtist">Greenhouse Echoes</p>
        </div>

        <div class="control-group">
          <div class="status-row">
            <span id="currentTime">0:00</span>
            <span id="durationTime">0:00</span>
          </div>
          <div class="meter blue" id="progressContainer">
            <span id="progressBar"></span>
          </div>
        </div>

        <div class="action-grid">
          <button id="prevBtn" title="Previous">
            <i data-lucide="skip-back"></i>
          </button>
          <button id="playBtn" class="primary" title="Play/Pause">
            <i data-lucide="play" id="playIcon"></i>
          </button>
          <button id="nextBtn" title="Next">
            <i data-lucide="skip-forward"></i>
          </button>
          <button id="muteBtn" title="Mute/Unmute">
            <i data-lucide="volume-2" id="muteIcon"></i>
          </button>
        </div>

        <div class="control-group" style="margin-top: 18px;">
          <label>
            Volume
            <input type="range" id="volumeRange" min="0" max="1" step="0.01" value="0.7" />
          </label>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
