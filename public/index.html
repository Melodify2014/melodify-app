<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodify Pro | Phonk Edition</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="drift-bg" id="drift-bg">
        <div class="drift-overlay">
            <div class="drift-content">
                <h1 id="drift-title">SELECT A TRACK</h1>
                <div class="visualizer-container" id="viz-container"></div>
            </div>
            <div id="drift-artist-display" class="drift-artist-bottom">Phonk Player Pro</div>
        </div>
    </div>
    
    <button onclick="toggleDriftMode()" id="drift-close" class="drift-close-btn">✕ Exit Drift Mode</button>

    <div class="layout" id="main-layout">
        <aside class="sidebar">
            <div class="logo">MELODIFY<span class="dot">.</span></div>
            <div class="search-container">
                <input id="search-input" placeholder="Search Phonk..." onkeydown="if(event.key==='Enter') search()">
            </div>
            <nav class="nav-menu">
                <button onclick="showHome()" class="nav-btn active" id="btn-home">🏠 Home</button>
                <button onclick="showFollowing()" class="nav-btn" id="btn-following">👥 Following</button>
                <button onclick="showRecent()" class="nav-btn" id="btn-recent">🕒 Recent</button>
                <button onclick="showLiked()" class="nav-btn" id="btn-liked">❤️ Liked</button>
            </nav>
            <div class="sidebar-footer">
                <div class="mini-player-container"><div id="yt-player"></div></div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar"><h1 id="view-title">phonk feed</h1></header>
            <div id="grid" class="grid"></div>
        </main>
    </div>

    <div class="slim-player" id="player-bar">
        <div class="p-progress-container" onclick="seek(event)">
            <div class="p-progress-bar" id="progress-bar"></div>
        </div>
        <div class="p-inner">
            <div class="p-left">
                <div class="p-info">
                    <div id="p-title" class="p-title">Select a track</div>
                    <div id="p-artist" class="p-artist">Waiting for beat...</div>
                </div>
            </div>
            
            <div class="p-center">
                <button onclick="toggleLoop()" id="loop-btn" class="icon-btn">🔁</button>
                <button onclick="playPrev()" class="icon-btn-nav">⏮</button>
                <button onclick="togglePlay()" id="play-btn" class="play-main">PLAY</button>
                <button onclick="playNext()" class="icon-btn-nav">⏭</button>
                <button onclick="toggleLikeCurrent()" id="p-like-btn" class="icon-btn">❤️</button>
            </div>
            
            <div class="p-right">
                <div class="volume-container">
                    <span style="font-size: 12px; opacity: 0.6;">🔊</span>
                    <input type="range" id="volume-slider" min="0" max="100" value="100" oninput="changeVolume(this.value)">
                </div>
                <button onclick="toggleDriftMode()" class="drift-toggle-btn">🚗 DRIFT MODE</button>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="app.js"></script>
</body>
</html>
