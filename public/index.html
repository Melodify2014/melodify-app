<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodify — Audio Streaming</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="container">
        <h1 class="brand-title">Melodify</h1>
        
        <div class="search-bar">
            <input type="text" placeholder="Search tracks or producers...">
            <button class="btn">Search</button>
        </div>

        <div class="navigation-links">
            <span>🎵 Discover Feed</span> | <span>📺 Subscribed Channels</span>
        </div>

        <h2>Discover Tracks</h2>
        <div class="connection-status-message" id="status-node">Connecting to interface matrix...</div>

        <div class="video-container">
            <div id="player"></div>
        </div>

        <h2>Related Music Recommendations</h2>
        <h2>Your Subscribed Channels</h2>
        <h3>Producer Name</h3>
        <p class="sub-text">Verified Artist Channel</p>
        <button class="btn">Subscribe</button>

        <h2>Recent Uploads</h2>

        <div class="login-box">
            <h3>Sign In to Melodify</h3>
            <form id="auth-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="form-user" value="Melodify Owner">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="form-pass" value="******">
                </div>
                <button type="submit" class="btn full-width">Continue</button>
            </form>
        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
