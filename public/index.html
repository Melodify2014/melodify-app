<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodify</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app-viewport">
        
        <aside class="sidebar">
            <div class="brand-wrapper">
                <i class="fas fa-bolt"></i>
                <h1>Melodify</h1>
            </div>
            <div class="menu-group">
                <button class="menu-item active" id="nav-home">
                    <i class="fas fa-home"></i> Home
                </button>
                <button class="menu-item" id="nav-following">
                    <i class="fas fa-user-friends"></i> Following
                </button>
                <button class="menu-item" id="nav-recent">
                    <i class="fas fa-clock"></i> Recent
                </button>
                <button class="menu-item" id="nav-liked">
                    <i class="fas fa-heart"></i> Liked
                </button>
            </div>
        </aside>

        <header class="topbar">
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Live search YouTube channels & tracks...">
            </div>
            <div class="user-profile-widget">
                <i class="fas fa-bolt" style="color: var(--accent-primary)"></i>
                <span id="user-status">Connected: melodify owner</span>
                <button class="btn-logout">Logout</button>
            </div>
        </header>

        <main class="main-content-workspace">
            <div class="feed-header-wrapper">
                <div class="feed-title-context">
                    <h2 id="feed-heading">Phonk Feed</h2>
                </div>
            </div>
            
            <div class="tracks-grid-layout" id="main-grid"></div>
        </main>

        <footer class="master-hardware-deck">
            <div class="deck-metadata-cluster">
                <img id="player-thumb" src="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==" alt="Track">
                <div class="deck-text-node">
                    <h3 id="player-title">Select a track</h3>
                    <p id="player-artist">Unknown Producer</p>
                </div>
            </div>
            <div class="deck-timeline-core">
                <div class="deck-controls-row">
                    <button class="deck-btn"><i class="fas fa-step-backward"></i></button>
                    <button class="deck-btn playback-toggle-node" id="play-pause-btn"><i class="fas fa-play"></i></button>
                    <button class="deck-btn"><i class="fas fa-step-forward"></i></button>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-bar">
                        <div class="progress-filled" id="progress-filled"></div>
                    </div>
                </div>
            </div>
            <div class="deck-utility-bundle">
                <button class="deck-btn"><i class="fas fa-volume-up"></i></button>
                <button class="deck-btn"><i class="fas fa-heart"></i></button>
            </div>
        </footer>

    </div>

    <div id="yt-player-container"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="app.js"></script>
</body>
</html>
