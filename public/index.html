<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodify - Phonk Streaming Platform</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-bolt"></i> <span>MELODIFY</span>
            </div>
            <nav class="menu">
                <button id="nav-home" class="menu-item active"><i class="fa-solid fa-house"></i> Home</button>
                <button id="nav-following" class="menu-item"><i class="fa-solid fa-users"></i> Following</button>
                <button id="nav-recent" class="menu-item"><i class="fa-solid fa-clock"></i> Recent</button>
                <button id="nav-liked" class="menu-item"><i class="fa-solid fa-heart"></i> Liked</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="search-input" placeholder="Live search YouTube channels & tracks...">
                </div>
                <div class="user-profile-wrapper" style="display: flex; align-items: center; gap: 16px;">
                    <span id="user-display">Connecting...</span>
                    <button id="logout-btn" style="background: none; border: 1px solid var(--border); color: var(--txt-dim); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600;">Logout</button>
                </div>
            </header>

            <section class="content-body">
                <div class="feed-header">
                    <h1 id="feed-heading">Phonk Feed</h1>
                    <div class="filter-tabs">
                        <button id="filter-all" class="tab active">All</button>
                        <button id="filter-music" class="tab">Music</button>
                    </div>
                </div>
                <div id="tracks-grid" class="tracks-grid">
                    </div>
            </section>
        </main>

        <footer class="player-bar">
            <div class="now-playing">
                <img id="player-thumb" src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=100" alt="Current Track">
                <div class="track-info">
                    <h4 id="player-title">Select a track</h4>
                    <p id="player-producer">Unknown Producer</p>
                </div>
            </div>

            <div class="player-controls">
                <div class="buttons">
                    <button id="player-loop-btn" class="ctrl-btn"><i class="fa-solid fa-repeat"></i></button>
                    <button id="player-play-btn" class="ctrl-btn play-main"><i id="play-icon" class="fa-solid fa-play"></i></button>
                    <button id="player-like-btn" class="ctrl-btn"><i id="like-icon" class="fa-regular fa-heart"></i></button>
                </div>
                <div class="timeline">
                    <div class="progress-bar">
                        <div id="player-progress" class="progress" style="width: 0%;"></div>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <div id="auth-modal" class="auth-overlay" style="display: none;">
        <div class="auth-card">
            <h2 id="auth-title">Sign In to Melodify</h2>
            <div id="auth-error" class="auth-error-banner" style="display: none;"></div>
            <form id="auth-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="auth-username" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="auth-password" required>
                </div>
                <button type="submit" id="auth-submit-btn" class="auth-submit">Login</button>
            </form>
            <p class="auth-toggle-text"><span id="auth-toggle-text-label">New listener?</span> <a href="#" id="auth-toggle-btn">Create an account</a></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
